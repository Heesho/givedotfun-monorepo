<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Soil mound -->
    <ellipse cx="100" cy="158" rx="42" ry="10" fill="#4E4E4E" opacity="0.6"/>
    <path d="M58 158 C60 150, 70 142, 100 140 S140 150, 142 158" fill="#4E4E4E" opacity="0.8"/>
    <!-- Small cracks in soil -->
    <path d="M78 152 L82 148" stroke="#3E3E3E" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M112 150 L116 146" stroke="#3E3E3E" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M96 154 L98 150" stroke="#3E3E3E" stroke-width="0.6" fill="none" opacity="0.4"/>
    <!-- Drooping stem -->
    <path d="M100 140 C99 130, 98 118, 96 108 S92 88, 88 78 C86 72, 84 68, 80 66" stroke="#6E6E6E" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Small unfurled leaf bud at tip -->
    <path d="M80 66 C76 62, 74 58, 76 54 C78 56, 78 60, 80 64" stroke="#3DDC84" stroke-width="1.5" fill="#3DDC84" fill-opacity="0.3" opacity="0.8"/>
    <path d="M80 66 C82 62, 84 58, 82 55 C80 58, 80 62, 80 64" stroke="#3DDC84" stroke-width="1" fill="#3DDC84" fill-opacity="0.2" opacity="0.6"/>
    <!-- Tiny secondary drooping leaf on stem -->
    <path d="M94 100 C90 96, 88 92, 90 90" stroke="#6E6E6E" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Ground shadow -->
    <ellipse cx="100" cy="168" rx="36" ry="4" fill="#1A1A1A" opacity="0.15"/>
    <!-- Small pebbles -->
    <circle cx="68" cy="160" r="2" fill="#5E5E5E" opacity="0.3"/>
    <circle cx="130" cy="159" r="1.5" fill="#5E5E5E" opacity="0.25"/>
    <circle cx="88" cy="162" r="1" fill="#5E5E5E" opacity="0.2"/>
  </g>
</svg>
