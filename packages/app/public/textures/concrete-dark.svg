<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" result="mono"/>
      <feComponentTransfer result="adjusted">
        <feFuncR type="linear" slope="0.12" intercept="0.1"/>
        <feFuncG type="linear" slope="0.12" intercept="0.1"/>
        <feFuncB type="linear" slope="0.12" intercept="0.1"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#1A1A1A"/>
  <rect width="200" height="200" filter="url(#grain)" opacity="0.9"/>
</svg>
