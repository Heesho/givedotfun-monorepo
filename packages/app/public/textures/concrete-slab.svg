<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="slab">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" result="mono"/>
      <feComponentTransfer result="adjusted">
        <feFuncR type="linear" slope="0.1" intercept="0.14"/>
        <feFuncG type="linear" slope="0.1" intercept="0.14"/>
        <feFuncB type="linear" slope="0.1" intercept="0.14"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#242424"/>
  <rect width="200" height="200" filter="url(#slab)" opacity="0.85"/>
</svg>
