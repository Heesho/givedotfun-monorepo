# =============================================================================
# GIVEDOTFUN UNIFIED SUBGRAPH SCHEMA
# =============================================================================
# Central concept: Coin token is the universal entity across all fundraisers
# Each Coin has an LP pair (Coin/USDC) for price tracking
# Fundraisers are the donation mechanism linked to their Coin
# =============================================================================

# =============================================================================
# GLOBAL PROTOCOL STATS
# =============================================================================

type Protocol @entity(immutable: false) {
  id: ID!                              # "givedotfun"

  # Counts
  totalCoins: BigInt!                  # Total Coin tokens launched
  totalFundraisers: BigInt!            # Total fundraisers (same as coins)

  # Volume (in USDC)
  totalVolumeUsdc: BigDecimal!        # All-time trading volume
  totalVolume24h: BigDecimal!          # Rolling 24h volume (updated hourly)

  # Liquidity
  totalLiquidityUsdc: BigDecimal!     # Current total liquidity in USDC

  # Revenue
  totalTreasuryRevenue: BigDecimal!    # All treasury fees collected
  totalProtocolRevenue: BigDecimal!    # Protocol fees (1%)

  # Emissions
  totalMinted: BigDecimal!             # All Coin tokens minted across all fundraisers

  # Timestamps
  lastUpdated: BigInt!
}

# =============================================================================
# COIN TOKEN - The Universal Entity (Explore Page)
# =============================================================================

type Coin @entity(immutable: false) {
  id: ID!                              # Coin token address

  # Basic info
  name: String!
  symbol: String!
  decimals: Int!

  # Supply
  totalSupply: BigDecimal!             # Current total supply
  totalMinted: BigDecimal!             # Total ever minted by fundraiser

  # Associated contracts
  lpPair: Bytes!                       # LP pair address (Coin/USDC)
  usdcToken: Bytes!                   # USDC address (constant)
  launcher: Account!

  # ==========================================================================
  # PRICE DATA (from LP Sync events)
  # ==========================================================================

  # Current price
  price: BigDecimal!                   # Current price in USDC (reserve_usdc / reserve_coin)
  priceUSD: BigDecimal!                # Price in USD (if USDC price available)

  # Market metrics
  marketCap: BigDecimal!               # price * totalSupply (in USDC)
  marketCapUSD: BigDecimal!            # Market cap in USD
  liquidity: BigDecimal!               # Total USDC in LP
  liquidityUSD: BigDecimal!            # Liquidity in USD

  # LP reserves (from Sync)
  reserveCoin: BigDecimal!             # Coin tokens in LP
  reserveUsdc: BigDecimal!            # USDC in LP

  # ==========================================================================
  # VOLUME DATA (from LP Swap events)
  # ==========================================================================

  volume24h: BigDecimal!               # 24h volume in USDC
  volume7d: BigDecimal!                # 7d volume in USDC
  volumeTotal: BigDecimal!             # All-time volume in USDC
  txCount: BigInt!                     # Total swap transactions
  txCount24h: BigInt!                  # 24h transaction count

  # ==========================================================================
  # PRICE CHANGE
  # ==========================================================================

  priceChange1h: BigDecimal!           # % change
  priceChange24h: BigDecimal!          # % change
  priceChange7d: BigDecimal!           # % change

  priceHigh24h: BigDecimal!            # 24h high
  priceLow24h: BigDecimal!             # 24h low

  # For calculating 24h change
  price1hAgo: BigDecimal!              # Price snapshot
  price24hAgo: BigDecimal!             # Price snapshot
  price7dAgo: BigDecimal!              # Price snapshot

  # ==========================================================================
  # ACTIVITY (for "bump" sorting)
  # ==========================================================================

  lastSwapAt: BigInt!                  # Last LP swap timestamp
  lastFundraiserActivityAt: BigInt!    # Last fundraiser event
  lastActivityAt: BigInt!              # Max of swap and fundraiser activity

  # ==========================================================================
  # HOLDER DATA (optional - from Transfer events)
  # ==========================================================================

  holderCount: BigInt!                 # Unique holders

  # ==========================================================================
  # TIMESTAMPS
  # ==========================================================================

  createdAt: BigInt!
  createdAtBlock: BigInt!

  # ==========================================================================
  # RELATIONS
  # ==========================================================================

  fundraiser: Fundraiser!              # The fundraiser that mints this token
  swaps: [Swap!]! @derivedFrom(field: "coin")
  minuteData: [CoinMinuteData!]! @derivedFrom(field: "coin")
  hourData: [CoinHourData!]! @derivedFrom(field: "coin")
  dayData: [CoinDayData!]! @derivedFrom(field: "coin")
}

# =============================================================================
# PRICE CHART DATA
# =============================================================================

# Minute OHLCV candles (for fine-grained charts on new tokens)
type CoinMinuteData @entity(immutable: false) {
  id: ID!                              # {coinAddress}-{minuteIndex}
  coin: Coin!

  # Time
  timestamp: BigInt!                   # Minute start (unix)
  minuteIndex: Int!                    # Minutes since epoch

  # OHLC (in USDC)
  open: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  close: BigDecimal!

  # Volume
  volumeCoin: BigDecimal!              # Coin volume this minute
  volumeUsdc: BigDecimal!             # USDC volume this minute
  txCount: BigInt!                     # Swaps this minute

  # Liquidity snapshot
  liquidity: BigDecimal!               # USDC in LP at minute end
}

# Hourly OHLCV candles
type CoinHourData @entity(immutable: false) {
  id: ID!                              # {coinAddress}-{hourTimestamp}
  coin: Coin!

  # Time
  timestamp: BigInt!                   # Hour start (unix)
  hourIndex: Int!                      # Hours since epoch

  # OHLC (in USDC)
  open: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  close: BigDecimal!

  # Volume
  volumeCoin: BigDecimal!              # Coin volume this hour
  volumeUsdc: BigDecimal!             # USDC volume this hour
  txCount: BigInt!                     # Swaps this hour

  # Liquidity snapshot
  liquidity: BigDecimal!               # USDC in LP at hour end
}

# Daily OHLCV candles
type CoinDayData @entity(immutable: false) {
  id: ID!                              # {coinAddress}-{dayTimestamp}
  coin: Coin!

  # Time
  timestamp: BigInt!                   # Day start (unix)
  dayIndex: Int!                       # Days since epoch

  # OHLC (in USDC)
  open: BigDecimal!
  high: BigDecimal!
  low: BigDecimal!
  close: BigDecimal!

  # Volume
  volumeCoin: BigDecimal!
  volumeUsdc: BigDecimal!
  txCount: BigInt!

  # Liquidity snapshot
  liquidity: BigDecimal!

  # Supply snapshot
  totalSupply: BigDecimal!
  totalMinted: BigDecimal!
}

# =============================================================================
# SWAP EVENTS (Buy/Sell activity)
# =============================================================================

type Swap @entity(immutable: true) {
  id: ID!                              # {txHash}-{logIndex}
  coin: Coin!
  account: Account!

  # Swap details
  type: String!                        # "buy" or "sell"
  amountCoin: BigDecimal!              # Coin tokens swapped
  amountUsdc: BigDecimal!             # USDC swapped
  price: BigDecimal!                   # Execution price (usdc/coin)

  # Transaction
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
  logIndex: BigInt!
}

# =============================================================================
# FUNDRAISER - Merged entity (was Rig + Fundraiser)
# =============================================================================

type Fundraiser @entity(immutable: false) {
  id: ID!                              # Fundraiser contract address
  coin: Coin!                          # The Coin token this fundraiser mints

  # Common fields
  launcher: Account!
  auction: Bytes!
  quoteToken: Bytes!                   # Payment token for fundraiser actions
  uri: String!
  metadata: FundraiserMetadata

  # Initial LP amounts (from launch)
  usdcAmount: BigDecimal!              # USDC deposited into LP at launch (6 decimals -> BigDecimal)
  coinAmount: BigDecimal!              # Coin tokens deposited into LP at launch (18 decimals -> BigDecimal)

  # Emission config
  initialUps: BigInt!                  # Starting units per second (or per day for Fundraiser)
  tailUps: BigInt!                     # Minimum emission rate (floor)
  halvingPeriod: BigInt!               # Time or token amount for halving

  # Revenue tracking (in quoteToken)
  recipientRevenue: BigDecimal!        # Fees sent to recipient (50%)
  treasuryRevenue: BigDecimal!         # Fees sent to auction/treasury
  teamRevenue: BigDecimal!             # Fees to team
  protocolRevenue: BigDecimal!         # Fees to protocol

  # Emission tracking
  totalMinted: BigDecimal!             # Total Coin tokens minted by this fundraiser

  # Activity
  lastActivityAt: BigInt!              # Last fundraiser-specific event

  # Timestamps
  createdAt: BigInt!
  createdAtBlock: BigInt!

  # ==========================================================================
  # Fundraiser-specific data (was separate Fundraiser entity)
  # ==========================================================================

  # Addresses
  treasury: Bytes!                     # Treasury address (receives ~45% of donations)
  team: Bytes!                         # Team address (receives 4%, zero = disabled)

  # Emission config (fundraiser-specific)
  initialEmission: BigInt!             # Starting daily emission
  minEmission: BigInt!                 # Minimum daily emission (floor)
  minDonation: BigInt!                 # Minimum donation amount
  epochDuration: BigInt!               # Epoch duration in seconds

  # State
  currentDay: BigInt!                  # Current day number

  # Stats
  totalDonated: BigDecimal!            # Total donations received
  uniqueDonors: BigInt!                # Unique donor count

  # Relations
  donations: [Donation!]! @derivedFrom(field: "fundraiser")
  recipients: [Recipient!]! @derivedFrom(field: "fundraiser")
  dayData: [FundraiserDayData!]! @derivedFrom(field: "fundraiser")
  donorAccounts: [Donor!]! @derivedFrom(field: "fundraiser")
  dayDonorAccounts: [DayDonor!]! @derivedFrom(field: "fundraiser")
}

type FundraiserMetadata @entity(immutable: true) {
  id: ID!
  fundraiserId: String!
  uri: String!
  image: String
  name: String
  symbol: String
  description: String
  defaultMessage: String
  recipientName: String
  links: [String!]
}

# Recipient for Fundraiser
type Recipient @entity(immutable: false) {
  id: ID!                              # {fundraiserAddress}-{recipientAddress}
  fundraiser: Fundraiser!
  recipient: Bytes!                    # Recipient address
  isActive: Boolean!                   # Whether currently whitelisted
  totalReceived: BigDecimal!           # Total donations received
  addedAt: BigInt!
}

# Daily donation pool data
type FundraiserDayData @entity(immutable: false) {
  id: ID!                              # {fundraiserAddress}-{day}
  fundraiser: Fundraiser!
  day: BigInt!                         # Day number (days since fundraiser start)

  totalDonated: BigDecimal!            # Total donated this day
  donorCount: BigInt!                  # Number of unique donors this day
  emission: BigDecimal!                # Coin emission for this day

  # Timestamps
  timestamp: BigInt!                   # Day start timestamp
}

type Donation @entity(immutable: true) {
  id: ID!                              # {txHash}-{logIndex}
  fundraiser: Fundraiser!

  donor: Account!
  recipient: Bytes                     # Recipient address (read from fundraiser contract-level recipient)

  day: BigInt!                         # Day number
  amount: BigDecimal!                  # Donation amount
  uri: String!                         # Message URI attached to donation

  # Fee split (calculated from amount)
  recipientAmount: BigDecimal!         # 50% to recipient (single address set on fundraiser)
  treasuryAmount: BigDecimal!          # 45% to treasury
  teamAmount: BigDecimal!              # 4% to team

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Claim record (when donor claims their Coin tokens)
type Claim @entity(immutable: true) {
  id: ID!                              # {txHash}-{logIndex}
  fundraiser: Fundraiser!

  claimer: Account!
  day: BigInt!                         # Day being claimed
  amount: BigDecimal!                  # Coin tokens minted

  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

# Unique donor tracker (one per fundraiser + wallet)
type Donor @entity(immutable: false) {
  id: ID!                              # {fundraiserAddress}-{donorAddress}
  fundraiser: Fundraiser!
  donor: Account!
  firstDonationAt: BigInt!
}

# Unique donor tracker per day (one per fundraiser + day + wallet)
type DayDonor @entity(immutable: false) {
  id: ID!                              # {fundraiserAddress}-{day}-{donorAddress}
  fundraiser: Fundraiser!
  day: BigInt!
  donor: Account!
  firstDonationAt: BigInt!
}

# =============================================================================
# ACCOUNT - User wallet
# =============================================================================

type Account @entity(immutable: false) {
  id: ID!                              # Wallet address

  # Aggregate stats
  totalSwapVolume: BigDecimal!         # Volume traded in USDC
  totalFundraiserSpend: BigDecimal!    # Spent on fundraiser actions
  totalMined: BigDecimal!              # Coin tokens earned
  totalWon: BigDecimal!                # Coin tokens won

  # Activity
  lastActivityAt: BigInt!

  # Relations
  coinsLaunched: [Coin!]! @derivedFrom(field: "launcher")
  swaps: [Swap!]! @derivedFrom(field: "account")
  donations: [Donation!]! @derivedFrom(field: "donor")
}
