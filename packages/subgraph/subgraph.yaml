specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # ==========================================================================
  # FUNDRAISER CORE - Launches Fundraisers
  # ==========================================================================
  - kind: ethereum
    name: FundraiserCore
    network: base
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: FundraiserCore
      startBlock: 41874455
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Unit
        - Rig
        - Fundraiser
        - Account
      abis:
        - name: FundraiserCore
          file: ./abis/FundraiserCore.json
        - name: Fundraiser
          file: ./abis/Fundraiser.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: FundraiserCore__Launched(indexed address,indexed address,indexed address,address,address,address,address,string,string,string,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleFundraiserCoreLaunched
      file: ./src/cores/fundraiserCore.ts

templates:
  # ==========================================================================
  # UNISWAP V2 PAIR - Price and Volume tracking
  # ==========================================================================
  - kind: ethereum
    name: UniswapV2Pair
    network: base
    source:
      abi: UniswapV2Pair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Unit
        - UnitMinuteData
        - UnitHourData
        - UnitDayData
        - Swap
        - Account
      abis:
        - name: UniswapV2Pair
          file: ./abis/UniswapV2Pair.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleSwap
        - event: Sync(uint112,uint112)
          handler: handleSync
      file: ./src/pair.ts

  # ==========================================================================
  # FUNDRAISER - Donation events
  # ==========================================================================
  - kind: ethereum
    name: Fundraiser
    network: base
    source:
      abi: Fundraiser
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Rig
        - Fundraiser
        - Donation
        - Account
        - Unit
      abis:
        - name: Fundraiser
          file: ./abis/Fundraiser.json
        - name: FundraiserCore
          file: ./abis/FundraiserCore.json
      eventHandlers:
        - event: Fundraiser__Funded(address,indexed address,indexed address,uint256,uint256,string)
          handler: handleFunded
        - event: Fundraiser__Claimed(indexed address,uint256,uint256)
          handler: handleFundClaimed
        - event: Fundraiser__TreasuryFee(indexed address,indexed uint256,uint256)
          handler: handleFundTreasuryFee
        - event: Fundraiser__TeamFee(indexed address,indexed uint256,uint256)
          handler: handleFundTeamFee
        - event: Fundraiser__ProtocolFee(indexed address,indexed uint256,uint256)
          handler: handleFundProtocolFee
        - event: Fundraiser__RecipientSet(indexed address)
          handler: handleFundRecipientSet
        - event: Fundraiser__UriSet(string)
          handler: handleFundUriSet
        - event: Fundraiser__TreasurySet(indexed address)
          handler: handleFundTreasurySet
        - event: Fundraiser__TeamSet(indexed address)
          handler: handleFundTeamSet
      file: ./src/rigs/fundraiser.ts

  # ==========================================================================
  # UNIT TOKEN - Transfer events for holder tracking (optional)
  # ==========================================================================
  - kind: ethereum
    name: Unit
    network: base
    source:
      abi: ERC20
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Unit
        - Account
      abis:
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleUnitTransfer
      file: ./src/unit.ts
