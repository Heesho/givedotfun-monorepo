specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # ==========================================================================
  # CORE - Launches Fundraisers
  # ==========================================================================
  - kind: ethereum
    name: Core
    network: base
    source:
      address: "0xA0d79A8D35B6aCBFCa41241A3aaaA00a71C9B139"
      abi: Core
      startBlock: 42674313
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Coin
        - Fundraiser
        - Account
      abis:
        - name: Core
          file: ./abis/Core.json
        - name: Fundraiser
          file: ./abis/Fundraiser.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Core__Launched(indexed address,indexed address,indexed address,address,address,address,address,string,string,string,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleCoreLaunched
      file: ./src/cores/core.ts

templates:
  # ==========================================================================
  # UNISWAP V2 PAIR - Price and Volume tracking
  # ==========================================================================
  - kind: ethereum
    name: UniswapV2Pair
    network: base
    source:
      abi: UniswapV2Pair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Coin
        - CoinMinuteData
        - CoinHourData
        - CoinDayData
        - Swap
        - Account
      abis:
        - name: UniswapV2Pair
          file: ./abis/UniswapV2Pair.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleSwap
        - event: Sync(uint112,uint112)
          handler: handleSync
      file: ./src/pair.ts

  # ==========================================================================
  # FUNDRAISER - Donation events
  # ==========================================================================
  - kind: ethereum
    name: Fundraiser
    network: base
    source:
      abi: Fundraiser
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Fundraiser
        - Donation
        - Account
        - Coin
      abis:
        - name: Fundraiser
          file: ./abis/Fundraiser.json
        - name: Core
          file: ./abis/Core.json
      eventHandlers:
        - event: Fundraiser__Funded(address,indexed address,uint256,uint256,string)
          handler: handleFunded
        - event: Fundraiser__Claimed(indexed address,uint256,uint256)
          handler: handleFundClaimed
        - event: Fundraiser__TreasuryFee(indexed address,indexed uint256,uint256)
          handler: handleFundTreasuryFee
        - event: Fundraiser__TeamFee(indexed address,indexed uint256,uint256)
          handler: handleFundTeamFee
        - event: Fundraiser__ProtocolFee(indexed address,indexed uint256,uint256)
          handler: handleFundProtocolFee
        - event: Fundraiser__RecipientFee(indexed address,indexed uint256,uint256)
          handler: handleFundRecipientFee
        - event: Fundraiser__RecipientSet(indexed address)
          handler: handleFundRecipientSet
        - event: Fundraiser__UriSet(string)
          handler: handleFundUriSet
        - event: Fundraiser__TreasurySet(indexed address)
          handler: handleFundTreasurySet
        - event: Fundraiser__TeamSet(indexed address)
          handler: handleFundTeamSet
      file: ./src/fundraiser.ts

  # ==========================================================================
  # COIN TOKEN - Transfer events for holder tracking (optional)
  # ==========================================================================
  - kind: ethereum
    name: Coin
    network: base
    source:
      abi: ERC20
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Coin
        - Account
      abis:
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleCoinTransfer
      file: ./src/coin.ts

  - name: FundraiserMetadataFile
    kind: file/ipfs
    mapping:
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/metadata.ts
      handler: handleFundraiserMetadata
      entities:
        - FundraiserMetadata
      abis:
        - name: Fundraiser
          file: ./abis/Fundraiser.json
